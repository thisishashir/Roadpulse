services:
  - type: web
    name: roadpulse-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python download_road_model.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
